<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="login-box">
        <h1>✏ Edit Student</h1>

        <form method="POST">
            <input type="text" name="name" value="{{ student[1] }}" required>
            <input type="number" name="age" value="{{ student[2] }}" required>
            <input type="number" name="math" value="{{ student[3] }}" required>
            <input type="number" name="science" value="{{ student[4] }}" required>
            <input type="number" name="english" value="{{ student[5] }}" required>

            <button type="submit">Update Student</button>
        </form>
    </div>
</div>

</body>
</html>
