<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
</head>
<body>

<h1>Student Leaderboard</h1>

<table border="1">
    <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Average</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.average }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
